<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #1e293b; /* ਡਾਰਕ ਬੈਕਗਰਾਊਂਡ */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.elevatorContainer {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #334155; /* ਪੈਨਲ ਦਾ ਬੈਕਗਰਾਊਂਡ */
    padding: 40px;
    gap: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    border: 1px solid #475569;
}

.statusDisplay {
    background-color: #0f172a; /* ਡਿਜੀਟਲ ਸਕ੍ਰੀਨ ਲੁੱਕ */
    color: #38bdf8; /* ਸਕਾਈ ਬਲੂ ਟੈਕਸਟ */
    border: 2px solid #0284c7;
    height: 150px; /* ਹਾਈਟ ਘਟਾਈ ਹੈ ਤਾਂ ਜੋ ਟੈਕਸਟ ਫਿੱਟ ਰਹੇ */
    width: 280px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    gap: 10px;
    border-radius: 10px;
    font-size: 1.1rem;
    box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.2);
}

/* JavaScript ਰਾਹੀਂ ਆਉਣ ਵਾਲੇ <strong> ਟੈਗਸ ਲਈ */
.statusDisplay strong {
    color: #f8fafc; 
    font-weight: 600;
}

.elevatorControls {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    display: grid;
    width: 280px; /* ਡਿਸਪਲੇਅ ਦੇ ਬਰਾਬਰ ਚੌੜਾਈ */
    gap: 15px;
    grid-template-columns: repeat(3, 1fr);
    border: 1px solid #475569;
}

button {
    background: #475569;
    color: white;
    border: none;
    padding: 15px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 50%; /* ਗੋਲ ਬਟਨ */
    cursor: pointer;
    width: 60px;
    height: 60px;
    margin: auto;
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

button:hover {
    background: #64748b;
    transform: translateY(-2px);
}

button:active {
    background: #0284c7; /* ਦੱਬਣ 'ਤੇ ਬਲੂ ਕਲਰ */
    transform: translateY(1px);
}

    </style>
</head>
<body>
    <div class="elevatorContainer">
        <div class="statusDisplay">Idle</div>
          <div class="elevatorControls">
          <button data-floor="1">1</button>
          <button data-floor="2">2</button>
          <button data-floor="3">3</button>
          <button data-floor="4">4</button>
          <button data-floor="5">5</button>
       </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
