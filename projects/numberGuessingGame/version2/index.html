<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        /* Centers everything on the screen */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* The game container card */
        .thisgame {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333333;
            margin-top: 0;
            font-size: 24px;
        }

        .message {
            color: #666666;
            font-size: 16px;
        }

        /* Style for the number input */
        input[type="text"] {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #007bff;
        }

        /* Big bold guess counter/display */
        .guess {
            font-size: 48px;
            font-weight: bold;
            color: #007bff;
            margin: 15px 0;
        }

        /* Action button */
        .StartBtn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 6px;
            border-radius: 6px;
            cursor: pointer;
            width: 85%;
            transition: background-color 0.2s;
        }

        .StartBtn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="thisgame">
        <h1>Number Guessing Game</h1>
        <p class="message">Play this game </p>
        <input class="userGuess" type="text" alt="enter any number btw 1 to 10" placeholder="Enter 1 to 10">
        <p class="guess">0</p>
        <button class="StartBtn">Start</button>
    </div>
     <script src="script.js"></script>
</body>
</html>
